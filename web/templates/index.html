<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graph Retrieval — MUTAG</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --card:     #1a1e28;
    --border:   #252a38;
    --accent:   #4f8ef7;
    --accent2:  #a78bfa;
    --green:    #34d399;
    --amber:    #fbbf24;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'JetBrains Mono', monospace;
    --display:  'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }
  header .logo {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  header .logo span { color: var(--accent); }
  header .tag {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 11px; color: var(--muted); }

  input[type="number"], select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 6px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus, select:focus { border-color: var(--accent); }

  /* Method toggle */
  .toggle-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .toggle-btn {
    padding: 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.08);
  }

  /* Query card */
  .query-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .query-card.visible { display: flex; }
  .query-card .qlabel {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .query-card .qindex {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-row {
    display: flex;
    gap: 12px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat .val {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .stat .key {
    font-size: 10px;
    color: var(--muted);
  }

  .label-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .label-0 { background: rgba(251,191,36,0.15); color: var(--amber); }
  .label-1 { background: rgba(52,211,153,0.15); color: var(--green); }

  /* Retrieve button */
  .retrieve-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
  }
  .retrieve-btn:hover { opacity: 0.85; }
  .retrieve-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Main content */
  .main {
    padding: 28px 32px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .results-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .time-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }
  .time-badge span { color: var(--green); }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .result-card:hover { border-color: var(--accent2); }

  .result-card .rank {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .result-card .ridx {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 800;
    color: var(--accent2);
  }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }
  .empty .big { font-size: 48px; opacity: 0.2; }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* Error */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
  }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Graph<span>Retrieval</span></div>
  <div class="tag">MUTAG · {{ total }} graphs</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">

    <div>
      <div class="section-label">Query</div>
      <div class="input-group">
        <label>Graph index (0 – {{ total - 1 }})</label>
        <input type="number" id="graph-idx" min="0" max="{{ total - 1 }}" value="0"/>
      </div>
    </div>

    <div id="query-card" class="query-card">
      <div class="qlabel">Selected graph</div>
      <div class="qindex" id="q-index">—</div>
      <div class="stat-row">
        <div class="stat">
          <div class="val" id="q-nodes">—</div>
          <div class="key">nodes</div>
        </div>
        <div class="stat">
          <div class="val" id="q-edges">—</div>
          <div class="key">edges</div>
        </div>
        <div class="stat">
          <div class="val" id="q-label-pill">—</div>
          <div class="key">label</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Settings</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="input-group">
          <label>Top-k</label>
          <select id="k-select">
            <option value="5">k = 5</option>
            <option value="10">k = 10</option>
            <option value="20">k = 20</option>
          </select>
        </div>
        <div class="input-group">
          <label>Method</label>
          <div class="toggle-group">
            <div class="toggle-btn active" data-method="lsh" onclick="setMethod('lsh')">LSH-ANN</div>
            <div class="toggle-btn" data-method="brute" onclick="setMethod('brute')">Brute-force</div>
          </div>
        </div>
      </div>
    </div>

    <button class="retrieve-btn" id="retrieve-btn" onclick="retrieve()">Retrieve</button>

  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="empty">
      <div class="big">◈</div>
      <p>Enter a graph index and click<br/>Retrieve to find similar graphs.</p>
    </div>
  </div>

</div>

<script>
  let selectedMethod = 'lsh';

  // Load graph info on index change
  const idxInput = document.getElementById('graph-idx');
  idxInput.addEventListener('input', () => loadGraph(idxInput.value));
  loadGraph(0);

  function setMethod(m) {
    selectedMethod = m;
    document.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.method === m);
    });
  }

  async function loadGraph(idx) {
    if (idx === '' || idx < 0) return;
    try {
      const res  = await fetch(`/graph/${idx}`);
      const data = await res.json();
      if (data.error) return;
      document.getElementById('query-card').classList.add('visible');
      document.getElementById('q-index').textContent  = `#${data.index}`;
      document.getElementById('q-nodes').textContent  = data.nodes;
      document.getElementById('q-edges').textContent  = data.edges;
      document.getElementById('q-label-pill').innerHTML =
        `<span class="label-pill label-${data.label}">${data.label === 1 ? 'mutagenic' : 'non-mut.'}</span>`;
    } catch(e) {}
  }

  async function retrieve() {
    const idx = parseInt(document.getElementById('graph-idx').value);
    const k   = parseInt(document.getElementById('k-select').value);
    const btn = document.getElementById('retrieve-btn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Retrieving…';

    const main = document.getElementById('main');
    main.innerHTML = '';

    try {
      const res  = await fetch('/retrieve', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ index: idx, k, method: selectedMethod }),
      });
      const data = await res.json();

      if (data.error) {
        main.innerHTML = `<div class="error-msg">${data.error}</div>`;
        return;
      }

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'results-header';
      hdr.innerHTML = `
        <div class="results-title">Top-${k} results · <span style="color:var(--accent2)">${data.method === 'lsh' ? 'LSH-ANN' : 'Brute-force'}</span></div>
        <div class="time-badge">Query time: <span>${data.time_ms} ms</span></div>
      `;
      main.appendChild(hdr);

      // Grid
      const grid = document.createElement('div');
      grid.className = 'results-grid';

      data.results.forEach((g, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="rank"># ${i + 1}</div>
          <div class="ridx">${g.index}</div>
          <div class="stat-row">
            <div class="stat"><div class="val">${g.nodes}</div><div class="key">nodes</div></div>
            <div class="stat"><div class="val">${g.edges}</div><div class="key">edges</div></div>
          </div>
          <div><span class="label-pill label-${g.label}">${g.label === 1 ? 'mutagenic' : 'non-mutagenic'}</span></div>
        `;
        grid.appendChild(card);
      });

      main.appendChild(grid);

    } catch(e) {
      main.innerHTML = `<div class="error-msg">Server error. Is app.py running?</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Retrieve';
    }
  }
</script>
</body>
</html>
