<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graph Retrieval — MUTAG</title>
<meta name="description" content="Interactive graph similarity retrieval on the MUTAG dataset using GIN embeddings and LSH indexing."/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<header>
  <div class="logo">Graph<span>Retrieval</span></div>
  <div class="tag">MUTAG · {{ total }} graphs</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">

    <div>
      <div class="section-label">Query</div>
      <div class="input-group">
        <label>Graph index (0 – {{ total - 1 }})</label>
        <input type="number" id="graph-idx" min="0" max="{{ total - 1 }}" value="0"/>
      </div>
    </div>

    <div id="query-card" class="query-card">
      <div class="qlabel">Selected graph</div>
      <div class="qindex" id="q-index">—</div>
      <div class="stat-row">
        <div class="stat">
          <div class="val" id="q-nodes">—</div>
          <div class="key">nodes</div>
        </div>
        <div class="stat">
          <div class="val" id="q-edges">—</div>
          <div class="key">edges</div>
        </div>
        <div class="stat">
          <div class="val" id="q-label-pill">—</div>
          <div class="key">label</div>
        </div>
      </div>
      <div class="graph-viz" id="query-graph-viz"></div>
    </div>

    <div>
      <div class="section-label">Settings</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="input-group">
          <label>Top-k</label>
          <select id="k-select">
            <option value="5">k = 5</option>
            <option value="10">k = 10</option>
            <option value="20">k = 20</option>
          </select>
        </div>
        <div class="input-group">
          <label>Method</label>
          <div class="toggle-group">
            <div class="toggle-btn active" data-method="lsh" onclick="setMethod('lsh')">LSH-ANN</div>
            <div class="toggle-btn" data-method="brute" onclick="setMethod('brute')">Brute-force</div>
          </div>
        </div>
      </div>
    </div>

    <button class="retrieve-btn" id="retrieve-btn" onclick="retrieve()">Retrieve</button>

  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="empty">
      <div class="big">◈</div>
      <p>Enter a graph index and click<br/>Retrieve to find similar graphs.</p>
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
